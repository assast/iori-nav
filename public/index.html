<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{SITE_NAME}} - 网址导航</title>
  <meta name="description" content="{{SITE_DESCRIPTION}}">
  <link rel="canonical" href="{{CANONICAL_URL}}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{SITE_NAME}}">
  <meta property="og:title" content="{{SITE_NAME}} - 网址导航">
  <meta property="og:description" content="{{SITE_DESCRIPTION}}">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:image" content="{{OG_IMAGE_URL}}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{SITE_NAME}} - 网址导航">
  <meta name="twitter:description" content="{{SITE_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE_URL}}">
  <link rel="icon" href="/favicon.svg?v=148aafdf" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css?v=163ad683">
  <script>
    // Init Theme ASAP to prevent FOUC
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  </script>
  <link rel="stylesheet" href="/css/tailwind.min.css?v=f596db02">
</head>
<body class="bg-secondary-50 font-sans text-gray-800">
  <!-- SVG sprite: 高频复用图标在此定义一次，卡片等处通过 <use href="#icon-xxx"/> 引用 -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <symbol id="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
      <path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
    </symbol>
    <symbol id="icon-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
      <path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
    </symbol>
    <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
      <path d="M19 9l-7 7-7-7"/>
    </symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
      <path d="M9 5l7 7-7 7"/>
    </symbol>
    <symbol id="icon-external-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
      <path d="M14 3h7v7"/>
      <path d="M10 14 21 3"/>
      <path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/>
    </symbol>
  </svg>
  <input type="checkbox" id="sidebar-toggle" class="hidden">
  
  <!-- 左上角操作区 (移动端导航按钮 或 GitHub 图标) -->
  {{LEFT_TOP_ACTION}}

  <!-- 右上角操作区 (主题切换, 后台入口) -->
  {{RIGHT_TOP_ACTION}}
  
  <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 mobile-overlay lg:hidden"></div>
  
  <!-- 桌面侧边栏开关按钮 -->
  <div class="fixed top-4 left-4 z-50 hidden lg:block {{SIDEBAR_TOGGLE_CLASS}}">
    <label for="sidebar-toggle" class="p-2 rounded-lg bg-white shadow-md hover:bg-gray-100 inline-block cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </label>
  </div>
  
  <!-- 侧边栏 -->
  <aside id="sidebar" class="sidebar fixed left-0 top-0 h-full w-64 z-50 overflow-y-auto mobile-sidebar lg:transform-none transition-all duration-300 {{SIDEBAR_CLASS}}" aria-label="分类目录">
    <div class="sidebar-inner">
      <div class="sidebar-toolbar">
        <a href="https://slink.661388.xyz/iori-nav" target="_blank" rel="noopener noreferrer" class="sidebar-tool-btn" title="GitHub" aria-label="GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
        </a>
        <button id="closeSidebar" type="button" class="sidebar-tool-btn lg:hidden" aria-label="关闭目录">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <label for="sidebar-toggle" class="sidebar-tool-btn hidden lg:inline-flex cursor-pointer" aria-label="收起目录">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </label>
      </div>

      <nav class="sidebar-nav" aria-label="书签分类">
        <div class="sidebar-nav-header">
          <p class="sidebar-nav-heading">目录</p>
          <div class="sidebar-nav-actions" role="group" aria-label="目录展开控制">
            <button type="button" id="sidebarExpandToLevel2" class="sidebar-nav-action-btn" title="全部展开到二级">展开二级</button>
            <button type="button" id="sidebarCollapseAll" class="sidebar-nav-action-btn" title="全部收起">全部收起</button>
          </div>
        </div>
        <div class="sidebar-nav-list">
          <div class="sidebar-nav-item" data-depth="0" data-nav-all-item="1">
            <div class="sidebar-nav-row">
              <span class="sidebar-nav-toggle-spacer" aria-hidden="true"></span>
              <a href="?catalog=all" class="sidebar-nav-link {{CATALOG_EXISTS}}" data-nav-all="1" style="--nav-depth: 0">
                <span class="sidebar-nav-label">全部</span>
              </a>
            </div>
          </div>
          {{CATALOG_LINKS}}
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="{{SUBMISSION_CLASS}}">
          <button id="addSiteBtnSidebar" type="button" class="sidebar-submit-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            添加书签
          </button>
        </div>
        <a href="/admin" target="_blank" rel="noopener noreferrer" class="sidebar-admin-link">
          后台管理
        </a>
        <p class="sidebar-version" title="应用版本（根目录 VERSION）">v{{APP_VERSION}}</p>
      </div>
    </div>
  </aside>
  
  <!-- 主内容区 -->
  <main class="main-content {{MAIN_CLASS}} min-h-screen transition-all duration-300">
    <header class="{{HEADER_CLASS}} text-white py-4 sm:py-8 px-4 sm:px-6 md:px-10 shadow-sm">
      {{HEADER_CONTENT}}
    </header>
    
    <div class="max-w-7xl mx-auto px-3 sm:px-6 {{STATS_ROW_PY_CLASS}}">
      <div class="flex items-center justify-between {{STATS_ROW_HIDDEN}}">
        <h2 class="text-base sm:text-xl font-semibold text-gray-800 {{STATS_VISIBLE}}" {{STATS_STYLE}} data-role="list-heading" data-default="{{HEADING_DEFAULT}}" data-active="{{HEADING_ACTIVE}}">
          {{HEADING_TEXT}}
        </h2>
      </div>
    </div>
    
    <section class="max-w-7xl mx-auto px-3 sm:px-6 pb-8 sm:pb-12">
      <div class="{{CONTAINER_CLASS}} p-3 sm:p-6">
        <div id="sitesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
          {{SITES_GRID}}
        </div>
        <div id="sitesEmptyState" class="hidden py-10">
          <div class="mx-auto max-w-md rounded-2xl border border-dashed border-primary-200 bg-white/80 px-6 py-10 text-center shadow-sm dark:border-gray-700 dark:bg-gray-800/80">
            <p class="text-base font-medium text-gray-800 dark:text-gray-100">没找到匹配书签</p>
            <button id="clearSearchBtn" type="button" class="mt-4 inline-flex items-center justify-center rounded-full bg-primary-600 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-primary-700">
              清空搜索
            </button>
          </div>
        </div>
      </div>
    </section>
    
    <footer class="{{FOOTER_CLASS}}">
      <div class="max-w-5xl mx-auto text-center">
        <div class="flex justify-center items-center space-x-4">
          <a href="https://slink.661388.xyz/iori-nav" target="_blank" class="flex items-center hover:text-primary-500 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
            <span>GitHub</span>
          </a>
          <span class="text-gray-300">|</span>
          <p>© {{CURRENT_YEAR}} {{FOOTER_TEXT}}</p>
        </div>
      </div>
    </footer>
  </main>
  
  <button id="backToTop" class="fixed bottom-8 right-8 p-3 rounded-full bg-accent-500 text-white shadow-lg opacity-0 invisible transition-all duration-300 hover:bg-accent-600">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 11l7-7 7 7M5 19l7-7 7 7" />
    </svg>
  </button>

  <!-- 分类批量打开确认 -->
  <div id="categoryOpenConfirmModal" class="category-open-confirm-modal" aria-hidden="true">
    <div class="category-open-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="categoryOpenConfirmTitle" aria-describedby="categoryOpenConfirmSummary" tabindex="-1">
      <div class="category-open-confirm-header">
        <div class="min-w-0">
          <h2 id="categoryOpenConfirmTitle">确认一键打开</h2>
          <p id="categoryOpenConfirmTarget"></p>
        </div>
        <button id="closeCategoryOpenConfirm" type="button" class="category-open-confirm-close" aria-label="关闭确认框">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>

      <form id="categoryOpenConfirmForm">
        <p id="categoryOpenConfirmSummary" class="category-open-confirm-summary"></p>

        <fieldset id="categoryOpenScopeFields" class="category-open-scope-fields" hidden>
          <legend>打开范围</legend>
          <label class="category-open-scope-option">
            <input id="categoryOpenScopeCurrent" type="radio" name="categoryOpenScope" value="current" checked>
            <span class="category-open-scope-copy">
              <strong>仅当前分类</strong>
              <small>只打开当前分类自己的书签</small>
            </span>
            <span id="categoryOpenCurrentCount" class="category-open-scope-count"></span>
          </label>
          <label class="category-open-scope-option">
            <input id="categoryOpenScopeDescendants" type="radio" name="categoryOpenScope" value="descendants">
            <span class="category-open-scope-copy">
              <strong>包含子分类</strong>
              <small>同时打开所有下级分类的书签</small>
            </span>
            <span id="categoryOpenDescendantCount" class="category-open-scope-count"></span>
          </label>
        </fieldset>

        <div class="category-open-confirm-actions">
          <button id="cancelCategoryOpenConfirm" type="button" class="category-open-cancel-btn">取消</button>
          <button id="confirmCategoryOpen" type="submit" class="category-open-submit-btn">确认打开</button>
        </div>
      </form>
    </div>
  </div>
  
  <!-- 添加网站模态框 -->
  <div id="addSiteModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 opacity-0 invisible transition-all duration-300">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 transform translate-y-8 transition-all duration-300">
      <div class="p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold text-gray-900">添加新书签</h2>
          <button id="closeModal" class="text-gray-400 hover:text-gray-500">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        
        <form id="addSiteForm" class="space-y-4">
          <div>
            <label for="addSiteName" class="block text-sm font-medium text-gray-700">名称</label>
            <input type="text" id="addSiteName" required class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
          </div>
          
          <div>
            <label for="addSiteUrl" class="block text-sm font-medium text-gray-700">网址</label>
            <input type="text" id="addSiteUrl" required class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
          </div>
          
          <div>
            <label for="addSiteLogo" class="block text-sm font-medium text-gray-700">Logo (可选)</label>
            <input type="text" id="addSiteLogo" class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
          </div>
          
          <div>
            <label for="addSiteDesc" class="block text-sm font-medium text-gray-700">描述 (可选)</label>
            <textarea id="addSiteDesc" rows="2" class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400"></textarea>
          </div>
          
          <div>
            <label for="addSiteCatelog" class="block text-sm font-medium text-gray-700">分类</label>
            <select id="addSiteCatelog" required class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400 bg-white">
              <option value="" disabled selected>加载中...</option>
            </select>
          </div>
          
          <div class="flex justify-end pt-4">
            <button type="button" id="cancelAddSite" class="bg-white py-2 px-4 border border-primary-100 rounded-md shadow-sm text-sm font-medium text-primary-600 hover:bg-secondary-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-200 mr-3">
              取消
            </button>
            <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-accent-500 hover:bg-accent-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent-400">
              提交
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <script src="/js/clicks-storage.js?v=fbd8fc30"></script>
  <script src="/js/main.js?v=067890d6"></script>
</body>
</html>
